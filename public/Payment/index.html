<!DOCTYPE html>
<html>

<head>
  <script>!function () { var s = sessionStorage.getItem('creatorpay_dark_mode'); if (s === '1') { document.documentElement.classList.add('dark-mode'); } }();</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap rel=stylesheet>
  <title>Payment - Creator Pay</title>
  <link rel=" icon" href="/file/logo1.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="landing.css">
  <script src="api-config.js"></script>
  <script src="auth-guard.js"></script>
  <script src="toast.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    #resources {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .resource-card {
      border: 1px solid #e2e8f0;
      padding: 20px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s;
    }

    .resource-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .buy-btn {
      background: #8b5cf6;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      margin-top: 10px;
    }

    .buy-btn:hover {
      background: #7c3aed;
    }
  </style>
  <link rel="stylesheet" href="../dark-theme.css">
</head>

<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-header">
        <a href="../" style="text-decoration: none; color: inherit;">
          <h1 class="logo">💰 Creator Pay</h1>
        </a>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
          <span class="hamburger"></span>
          <span class="hamburger"></span>
          <span class="hamburger"></span>
        </button>
      </div>
      <div class="nav-links">
        <a href="../#resources">Resources</a>
        <a href="../#about">About</a>
        <a href="../Dashboard/">Dashboard</a>
        <button id="logoutBtn" class="admin-btn" onclick="logout()" style="display:none;">Logout</button>
      </div>
    </div>

    <!-- Mobile Sidebar -->
    <div class="mobile-sidebar" id="mobileSidebar">
      <div class="mobile-sidebar-header">
        <h2>💰 Creator Pay</h2>
        <button class="close-sidebar" onclick="toggleMobileMenu()">&times;</button>
      </div>
      <div class="mobile-sidebar-content">
        <a href="../" onclick="toggleMobileMenu()">🏠 Home</a>
        <a href="../About/" onclick="toggleMobileMenu()">ℹ️ About</a>
        <a href="../Contact/" onclick="toggleMobileMenu()">📞 Contact</a>
        <a href="../#resources" onclick="toggleMobileMenu()">📚 Resources</a>
        <a href="../Dashboard/" onclick="toggleMobileMenu()">📊 Dashboard</a>
        <a href="../Terms/" onclick="toggleMobileMenu()">📜 Terms</a>
        <a href="../Privacy/" onclick="toggleMobileMenu()">🔒 Privacy</a>
        <a href="../Payment/" onclick="toggleMobileMenu()">💳 Payment</a>
      </div>
    </div>
    <div class="mobile-sidebar-overlay" id="mobileSidebarOverlay" onclick="toggleMobileMenu()"></div>
  </nav>
  <h1 style="padding: 20px; margin: 0;">Purchase Resources</h1>
  <div id="resources"></div>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';

    if (!currentUser || !isLoggedIn) {
      alert('Please login first');
      window.location.href = '/';
      throw new Error('Not logged in'); // Stop script execution
    }

    async function loadResources() {
      const response = await fetch(API_CONFIG.getURL(API_CONFIG.endpoints.resources));
      const resources = await response.json();

      const container = document.getElementById('resources');
      container.innerHTML = resources.map(resource => `
        <div class="resource-card">
          <h3>${resource.title}</h3>
          <p>${resource.description}</p>
          <p><strong>Price: ₹${resource.price}</strong></p>
          <button class="buy-btn" onclick="buyResource(${resource.id}, ${resource.price}, '${resource.title}')">
            Buy Now
          </button>
        </div>
      `).join('');
    }

    async function buyResource(resourceId, price, title) {
      try {
        console.log('Starting payment for:', { resourceId, price, title });

        // Create order
        const orderResponse = await fetch(API_CONFIG.getURL(API_CONFIG.endpoints.createOrder), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: price,
            receipt: `receipt_${resourceId}_${Date.now()}`
          })
        });

        if (!orderResponse.ok) {
          const errorText = await orderResponse.text();
          console.error('Order creation failed:', errorText);
          throw new Error(`Failed to create order: ${errorText}`);
        }

        const order = await orderResponse.json();
        console.log('Order created:', order);

        // Get Razorpay key from server
        const keyResponse = await fetch(API_CONFIG.getURL(API_CONFIG.endpoints.paymentKey));
        if (!keyResponse.ok) {
          throw new Error('Failed to get payment key');
        }
        const keyData = await keyResponse.json();

        if (!keyData.key) {
          throw new Error('Payment key not configured');
        }

        // Open Razorpay checkout
        const options = {
          key: keyData.key,
          amount: order.amount,
          currency: order.currency,
          name: 'creatorpay_dark_mode',
          description: title,
          order_id: order.id,
          timeout: 300,
          handler: async function (response) {
            try {
              console.log('Payment response:', response);

              // Verify payment
              const verifyResponse = await fetch(API_CONFIG.getURL(API_CONFIG.endpoints.verifyPayment), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_signature: response.razorpay_signature,
                  resourceId: resourceId,
                  userId: currentUser.id
                })
              });

              if (!verifyResponse.ok) {
                const errorText = await verifyResponse.text();
                console.error('Verification failed:', errorText);
                throw new Error(`Verification failed: ${errorText}`);
              }

              const result = await verifyResponse.json();
              console.log('Verification result:', result);

              if (result.success) {
                alert('Payment successful! You can now access this resource.');
                window.location.href = 'dashboard.html';
              } else {
                alert('Payment verification failed: ' + (result.error || 'Unknown error'));
              }
            } catch (error) {
              console.error('Payment verification error:', error);
              alert('Payment verification failed: ' + error.message);
            }
          },
          prefill: {
            name: currentUser.name || '',
            email: currentUser.email || ''
          },
          modal: {
            ondismiss: function () {
              console.log('Payment modal dismissed');
              alert('Payment cancelled by user');
            }
          },
          theme: {
            color: '#8b5cf6'
          }
        };

        console.log('Opening Razorpay with options:', options);
        const rzp = new Razorpay(options);
        rzp.on('payment.failed', function (response) {
          console.error('Payment failed:', response.error);
          alert('Payment failed: ' + response.error.description);
        });
        rzp.open();
      } catch (error) {
        console.error('Payment error:', error);
        alert('Payment failed: ' + error.message);
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      localStorage.removeItem('userLoggedIn');
      window.location.href = 'index.html';
    }

    loadResources();
  </script>
  <script src="landing.js"></script>
  <script src="../dark-theme.js"></script>
</body>

</html>
